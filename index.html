<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Orange glow top right -->
  <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#F97316" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <!-- Orange glow bottom left -->
  <radialGradient id="glow2" cx="15%" cy="85%" r="40%">
    <stop offset="0%" stop-color="#F97316" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Icon background -->
  <rect x="524" y="120" width="152" height="152" rx="32" fill="#F97316" opacity="0.15"/>
  <rect x="532" y="128" width="136" height="136" rx="28" fill="#F97316" opacity="0.2"/>

  <!-- Fuel drop icon -->
  <path d="M600 158 C600 158 568 190 568 212 a32 32 0 0 0 64 0 c0-22-32-54-32-54z"
        fill="none" stroke="#F97316" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand name -->
  <text x="600" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    Emmanuel's
  </text>
  <text x="600" y="396" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="-0.5">
    Fuel Tracking System
  </text>

  <!-- Feature pills -->
  <rect x="248" y="450" width="180" height="40" rx="20" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="338" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" fill="#F97316" text-anchor="middle" font-weight="600">Smart Inventory</text>

  <rect x="460" y="450" width="200" height="40" rx="20" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="560" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" fill="#F97316" text-anchor="middle" font-weight="600">Customer Analytics</text>

  <rect x="692" y="450" width="160" height="40" rx="20" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="772" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" fill="#F97316" text-anchor="middle" font-weight="600">Live Dashboard</text>

  <!-- Bottom tagline -->
  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">
    Track every litre. Know every customer.
  </text>
</svg>
